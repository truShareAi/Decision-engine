<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Green | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #4ade80; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
        .green-badge { background: #065f46; color: #4ade80; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        .peel-btn { background: #4ade80; color: #064e3b; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .peel-btn:hover { background: white; transform: scale(1.05); }
        .save-txt { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px; background: linear-gradient(135deg, #064e3b 0%, #1a222f 100%);">
    <div class="hero-container">
        <h1>Go <span class="pop" style="color: #4ade80;">Green</span> & Save</h1>
        <p>Sustainable choices that are good for the planet and even better for your pocket.</p>
    </div>
</section>

<div class="container">
    <table class="comp-table">
        <thead>
            <tr>
                <th>Service</th>
                <th>Eco-Benefit</th>
                <th>Estimated Cost</th>
                <th>Potential Saving</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="dealsTableBody">
            <tr><td colspan="5" style="text-align:center; padding: 40px;">Peeling the greenest deals...</td></tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    // 1. Component Loading
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => { 
        document.getElementById('mainFooter').innerHTML = data; 
    });

    // 2. Load Live Data for Go Green
    async function fetchLiveDeals() {
        const tableBody = document.getElementById('dealsTableBody');
        try {
            const response = await fetch(`${API_URL}/deals?category=go-green`);
            const deals = await response.json();
            
            if (deals.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No green deals found yet.</td></tr>';
                return;
            }

            tableBody.innerHTML = '';
            deals.forEach(deal => {
                const cost = parseFloat(deal.price).toLocaleString();
                // For 'Go Green', we use original_price column to represent estimated annual savings
                const saving = parseFloat(deal.original_price - deal.price).toFixed(2);

                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${deal.brand}</strong> <span class="green-badge">${deal.source}</span></td>
                        <td>${deal.name}</td>
                        <td>£${cost}</td>
                        <td class="save-txt">£${saving} Est. Save</td>
                        <td><button class="peel-btn" onclick="saveAndGo('${deal.brand}')">Peel the Deal</button></td>
                    </tr>
                `;
            });
        } catch (err) { 
            console.error(err);
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Connection error.</td></tr>'; 
        }
    }

    function saveAndGo(brand) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(brand + " - Green Deal");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    fetchLiveDeals();
</script>
</body>
</html>
