<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Hub | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Dashboard Layout */
        .hub-grid { 
            display: grid; 
            grid-template-columns: 320px 1fr 320px; 
            gap: 20px; 
            margin-top: 30px; 
            align-items: start;
        }

        .hub-card { 
            background: #111827; 
            border: 1px solid #374151; 
            border-radius: 12px; 
            padding: 20px; 
            overflow: hidden;
        }

        /* Sector Tabs */
        .sector-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #374151; padding-bottom: 10px; }
        .sector-btn { 
            background: transparent; border: none; color: #94a3b8; 
            cursor: pointer; font-weight: 700; font-size: 0.8rem; padding: 5px 10px;
        }
        .sector-btn.active { color: #ffcc00; border-bottom: 2px solid #ffcc00; }

        /* Modern List Items */
        .list-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid #1f2937; 
        }
        .price-up { color: #ef4444; font-size: 0.7rem; }
        .price-down { color: #10b981; font-size: 0.7rem; }

        .big-total { font-size: 2.2rem; font-weight: 900; color: #ffcc00; display: block; margin: 10px 0; }
        
        @media (max-width: 1100px) { .hub-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 30px 20px;">
    <div class="hero-container">
        <h1 style="font-size: 2.5rem;">Market <span class="pop">Control Room</span></h1>
        <p>Live morning audits across the UK's top 7 retailers.</p>
    </div>
</section>

<div class="container hub-grid">
    
    <div class="hub-card">
        <h3 style="color: #ffcc00; margin-top:0;">Daily Index</h3>
        <p style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 15px;">Total cost of 5 morning essentials.</p>
        <div id="indexContainer">
            </div>
        <div style="background: #1f2937; padding: 15px; margin-top: 20px; border-radius: 8px;">
            <span style="font-size: 0.7rem; color: #94a3b8;">TODAY'S MOVER</span>
            <p style="margin: 5px 0 0 0; font-weight: bold; color: #10b981;">Lidl (-2.4%)</p>
        </div>
    </div>

    <div class="hub-card">
        <div class="sector-nav">
            <button class="sector-btn active" onclick="loadSector('dairy')">DAIRY</button>
            <button class="sector-btn" onclick="loadSector('meats')">MEATS</button>
            <button class="sector-btn" onclick="loadSector('frozen')">FROZEN</button>
            <button class="sector-btn" onclick="loadSector('produce')">PRODUCE</button>
        </div>
        <div id="sectorGrid">
            </div>
    </div>

    <div class="hub-card">
        <h3 style="color: white; margin-top:0;">The Weekly Spend</h3>
        <p style="font-size: 0.7rem; color: #94a3b8;">Average 4-person family basket.</p>
        <span class="big-total" id="weeklyTotal">£74.20</span>
        <p style="font-size: 0.8rem; color: #94a3b8;">Cheapest: <strong>Aldi</strong></p>
        
        <div style="margin-top: 25px;">
            <h4 style="font-size: 0.8rem; color: #ffcc00;">Retailer Breakdown</h4>
            <canvas id="weeklyChart" style="width: 100%; height: 150px; background: #1f2937; border-radius: 5px;"></canvas>
            <p style="font-size: 0.6rem; color: #6b7280; margin-top: 10px;">*Based on 32 high-volume items.</p>
        </div>
    </div>

</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    async function loadSector(category) {
        // Implementation for tab switching and category fetching
        const grid = document.getElementById('sectorGrid');
        grid.innerHTML = `<p style="text-align:center; padding: 50px;">Fetching ${category} audits...</p>`;
        // In reality, this calls /api/grocery-comparison?sector=category
    }

    // Initial load logic here...
    loadSector('dairy');
</script>
</body>
</html>
