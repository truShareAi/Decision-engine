<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Matches the Home page split-header layout */
        .page-intro {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 3px solid #ffcc00;
        }
        .page-intro h1 { margin: 0; font-size: 2.5rem; flex: 1; }
        .page-intro p { flex: 1; margin: 0; color: #cbd5e1; max-width: 500px; line-height: 1.6; }

        .comparison-card {
            background: #1a222f;
            border: 1px solid #334155;
            border-radius: 15px;
            overflow: hidden;
        }

        /* The 5-column Header Bar from the Home page image */
        .table-header {
            background: rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr 1.5fr 150px;
            padding: 15px 25px;
            color: #ffcc00;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .quote-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr 1.5fr 150px;
            align-items: center;
            padding: 25px;
            border-bottom: 1px solid #334155;
            transition: 0.2s;
        }

        .quote-row:hover { background: rgba(255, 255, 255, 0.02); }
        .quote-row:last-child { border: none; }
        
        .price { font-size: 1.2rem; font-weight: 700; color: white; }
        .provider-logo { font-weight: bold; font-size: 1.1rem; color: white; }
        .benefit-tag { color: #64748b; font-size: 0.95rem; }
        
        .peel-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 8px; 
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .peel-btn:hover { background: white; }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<div class="container" style="margin-top: 80px;">
    <div class="page-intro">
        <h1>Protect Your <span class="pop">Car Bunch</span></h1>
        <p>Compare the UK's top providers to keep your set of wheels safe and sound on the road.</p>
    </div>

    <div class="comparison-card">
        <div class="table-header">
            <div>Provider</div>
            <div>Monthly</div>
            <div>Cover Type</div>
            <div>Extra Benefits</div>
            <div>Action</div>
        </div>

        <div class="quote-row">
            <div class="provider-logo">Direct Line</div>
            <div class="price">£35.40</div>
            <div style="color: #cbd5e1;">Comprehensive</div>
            <div class="benefit-tag">No Claims Discount</div>
            <button class="peel-btn" onclick="savePeel('Direct Line')">Peel the Deal</button>
        </div>

        <div class="quote-row">
            <div class="provider-logo">Aviva</div>
            <div class="price">£38.90</div>
            <div style="color: #cbd5e1;">Comprehensive</div>
            <div class="benefit-tag">Courtesy Car</div>
            <button class="peel-btn" onclick="savePeel('Aviva')">Peel the Deal</button>
        </div>

        <div class="quote-row">
            <div class="provider-logo">Admiral</div>
            <div class="price">£42.10</div>
            <div style="color: #cbd5e1;">Multi-Car</div>
            <div class="benefit-tag">Glass Repair</div>
            <button class="peel-btn" onclick="savePeel('Admiral')">Peel the Deal</button>
        </div>
    </div>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
        const script = document.createElement('script');
        script.src = '../js/app.js';
        script.onload = () => { if (typeof checkBananaAuth === "function") checkBananaAuth(); };
        document.body.appendChild(script);
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    function savePeel(provider) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(provider + " - Car Insurance");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
