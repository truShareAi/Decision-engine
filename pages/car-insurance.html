<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Exact Design from Home Page */
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #ffcc00; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
        .peel-btn { background: #ffcc00; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .peel-btn:hover { background: white; transform: scale(1.05); }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Protect Your <span class="pop">Car Bunch</span></h1>
        <p>Find the best deals for your set of wheels.</p>
    </div>
</section>

<div class="container">
    <table class="comp-table">
        <thead>
            <tr>
                <th>Provider</th>
                <th>Monthly</th>
                <th>Cover Type</th>
                <th>Extra Benefits</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Direct Line</strong></td>
                <td>£35.40</td>
                <td>Comprehensive</td>
                <td>No Claims Discount</td>
                <td><button class="peel-btn" onclick="savePeel('Direct Line')">Peel the Deal</button></td>
            </tr>
            <tr>
                <td><strong>Aviva</strong></td>
                <td>£38.90</td>
                <td>Comprehensive</td>
                <td>Courtesy Car</td>
                <td><button class="peel-btn" onclick="savePeel('Aviva')">Peel the Deal</button></td>
            </tr>
            <tr>
                <td><strong>Admiral</strong></td>
                <td>£42.10</td>
                <td>Multi-Car</td>
                <td>Glass Repair</td>
                <td><button class="peel-btn" onclick="savePeel('Admiral')">Peel the Deal</button></td>
            </tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
        const script = document.createElement('script');
        script.src = '../js/app.js';
        script.onload = () => { if (typeof checkBananaAuth === "function") checkBananaAuth(); };
        document.body.appendChild(script);
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    function savePeel(provider) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(provider + " - Car Insurance");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
