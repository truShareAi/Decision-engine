<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance | Banana</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<div class="container" style="margin-top: 50px; text-align: center;">
    <h1>Car <span class="pop">Insurance</span></h1>
    <p>Find the best deals for your set of wheels.</p>
    
    <div style="background: #1a222f; padding: 40px; border-radius: 15px; border: 1px solid #334155; margin-top: 30px;">
        <input type="text" id="regPlate" placeholder="Enter Registration (e.g. AB12 CDE)" style="display: block; width: 100%; max-width: 400px; margin: 0 auto 20px; padding: 12px; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white;">
        <button class="peel-btn" onclick="savePeel('Car Insurance')" style="max-width: 200px;">Get a Quote</button>
    </div>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    // 1. THE FIX: This function forces the Nav to show the Name
    function syncNav() {
        const user = localStorage.getItem('bananaUser');
        const authArea = document.getElementById('navAuthSection');
        
        if (user && authArea) {
            authArea.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <a href="/index.html" style="color: white; text-decoration: none; font-size: 0.9rem;">Home</a>
                    <a href="/pages/dashboard.html" style="color: #ffcc00; text-decoration: none; font-weight: bold; border: 1px solid #ffcc00; padding: 5px 12px; border-radius: 20px;">Hi, ${user}</a>
                </div>
            `;
        }
    }

    // 2. Load Nav and immediately trigger the Sync
    fetch('../components/nav.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('mainNav').innerHTML = data;
            syncNav(); // <--- This is the missing link
        });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    // 3. Save "Peel" to Dashboard
    function savePeel(type) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(type + " Quote Checked");
        if (history.length > 10) history.pop();
        localStorage.setItem('searchHistory', JSON.stringify(history));
        
        alert("Quote saved to your dashboard!");
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
