<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Insurance | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #ffcc00; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
        .peel-btn { background: #ffcc00; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .peel-btn:hover { background: white; transform: scale(1.05); }
        .annual-price { color: #00ff88; font-weight: bold; }
        
        .refine-box { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 30px; }
        .refine-input { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Protect Your <span class="pop">Car Bunch</span></h1>
        <p>Find the best deals for your set of wheels. <br><small>*Prices shown are representative examples.</small></p>
    </div>
</section>

<div class="container">
    <div class="refine-box">
        <h3 style="color: #ffcc00; margin-top:0;">⚡ Sharpen Your Quote</h3>
        <p style="font-size: 0.9rem; color: #94a3b8;">Adjust these factors to see your real-world Banana Estimate:</p>
        
        <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 15px;">
            <div style="flex: 1; min-width: 150px;">
                <label style="color:white; font-size: 0.8rem;">Age Bracket</label>
                <select id="ageBracket" class="refine-input">
                    <option value="1.0">25 - 50 (Standard)</option>
                    <option value="2.2">17 - 24 (New Driver)</option>
                    <option value="0.85">50+ (Experienced)</option>
                </select>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="color:white; font-size: 0.8rem;">NCB Years</label>
                <select id="ncbYears" class="refine-input">
                    <option value="1.0">5+ Years</option>
                    <option value="1.3">1 - 4 Years</option>
                    <option value="1.6">0 Years</option>
                </select>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="color:white; font-size: 0.8rem;">Convictions</label>
                <select id="convictions" class="refine-input">
                    <option value="1.0">None (Clean)</option>
                    <option value="1.2">Minor (e.g. SP30)</option>
                    <option value="1.8">Serious (e.g. DR10)</option>
                </select>
            </div>
            <div style="flex: 1; min-width: 150px;">
                <label style="color:white; font-size: 0.8rem;">Location</label>
                <select id="locationZone" class="refine-input">
                    <option value="1.0">Town / Suburb</option>
                    <option value="0.9">Rural / Village</option>
                    <option value="1.3">City Centre</option>
                    <option value="1.6">London / Metro</option>
                </select>
            </div>
            <button onclick="applyRefining()" class="peel-btn" style="align-self: flex-end; height: 42px; min-width: 150px;">Update Prices</button>
        </div>
    </div>

    <table class="comp-table">
        <thead>
            <tr>
                <th>Provider</th>
                <th>Est. Monthly</th>
                <th>Est. Annual</th>
                <th>Cover Type</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="dealsTableBody">
            <tr><td colspan="5" style="text-align:center; padding: 40px;">Peeling the latest deals...</td></tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    fetch('../components/nav.html').then(res => res.text()).then(data => { document.getElementById('mainNav').innerHTML = data; });
    fetch('../components/footer.html').then(res => res.text()).then(data => { document.getElementById('mainFooter').innerHTML = data; });

    async function fetchLiveDeals() {
        const tableBody = document.getElementById('dealsTableBody');
        try {
            const response = await fetch(`${API_URL}/deals?category=car-insurance`);
            const deals = await response.json();
            if (deals.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No insurance deals found.</td></tr>';
                return;
            }
            tableBody.innerHTML = '';
            deals.forEach(deal => {
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${deal.brand}</strong></td>
                        <td class="monthly-price" data-base="${deal.price}">£${parseFloat(deal.price).toFixed(2)}</td>
                        <td class="annual-price" data-base="${deal.original_price}">£${parseFloat(deal.original_price).toFixed(2)}</td>
                        <td>${deal.name}</td>
                        <td><button class="peel-btn" onclick="saveAndGo('${deal.brand}')">Peel the Deal</button></td>
                    </tr>
                `;
            });
        } catch (err) { tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Connection error.</td></tr>'; }
    }

    function applyRefining() {
        const ageMult = parseFloat(document.getElementById('ageBracket').value);
        const ncbMult = parseFloat(document.getElementById('ncbYears').value);
        const convMult = parseFloat(document.getElementById('convictions').value);
        const locMult = parseFloat(document.getElementById('locationZone').value);
        
        const totalMult = ageMult * ncbMult * convMult * locMult;

        document.querySelectorAll('.monthly-price').forEach(cell => {
            const base = parseFloat(cell.getAttribute('data-base'));
            cell.innerText = `£${(base * totalMult).toFixed(2)}`;
        });

        document.querySelectorAll('.annual-price').forEach(cell => {
            const base = parseFloat(cell.getAttribute('data-base'));
            cell.innerText = `£${(base * totalMult).toFixed(2)}`;
        });
    }

    function saveAndGo(brand) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(brand + " - Insurance Estimate");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    fetchLiveDeals();
</script>
</body>
</html>
