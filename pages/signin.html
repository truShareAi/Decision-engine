<script>
    function openModal() { document.getElementById('regModal').style.display = "block"; }
    function closeModal() { document.getElementById('regModal').style.display = "none"; }
    
    window.onclick = function(event) {
        if (event.target == document.getElementById('regModal')) { closeModal(); }
    }

    function handleLogin(sourceId, e) {
        if(e) e.preventDefault();
        const nameValue = document.getElementById(sourceId).value;

        if (!nameValue || nameValue.trim() === "") {
            alert("Please enter a name.");
            return;
        }

        localStorage.setItem('bananaUser', nameValue);
        window.location.href = 'dashboard.html';
    }

    // THE FAIL-SAFE LOAD
    // 1. Fetch the Nav
    fetch('../components/nav.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('mainNav').innerHTML = data;
            
            // 2. Dynamically inject the script so we KNOW it's there
            const script = document.createElement('script');
            // Using a relative path: go UP one level, then into JS
            script.src = '../js/app.js'; 
            
            script.onload = () => {
                // 3. Only run the check once the script is fully loaded
                if (typeof checkBananaAuth === "function") {
                    checkBananaAuth();
                }
            };
            document.head.appendChild(script);
        })
        .catch(err => console.error("Nav failed to load:", err));

    // Footer load
    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });
</script>
