<script>
    // 1. Modal Toggle Logic
    function openModal() { 
        const modal = document.getElementById('regModal');
        if (modal) modal.style.display = "block"; 
    }

    function closeModal() { 
        const modal = document.getElementById('regModal');
        if (modal) modal.style.display = "none"; 
    }
    
    // Close modal if user clicks the dark background overlay
    window.onclick = function(event) {
        const modal = document.getElementById('regModal');
        if (event.target === modal) { 
            closeModal(); 
        }
    }

    /**
     * The Master Login/Register Handler
     * @param {string} sourceId - The ID of the input field (userName or regName)
     * @param {HTMLElement} btn - Passing 'this' from the HTML ensures we grab the right button
     */
    function handleLogin(sourceId, btn) {
        const inputElement = document.getElementById(sourceId);
        
        // Validation
        if (!inputElement || inputElement.value.trim() === "") {
            alert("Please enter a name to continue.");
            return;
        }

        const name = inputElement.value.trim();

        // Visual Feedback (Changing the button that was actually clicked)
        if (btn) {
            btn.innerHTML = "Peeling...";
            btn.disabled = true;
            btn.style.opacity = "0.7";
            btn.style.cursor = "not-allowed";
        }

        // Save the session to the browser
        localStorage.setItem('bananaUser', name);

        // LOCK: The Redirect to Dashboard
        setTimeout(() => {
            // This assumes dashboard.html is in the same 'pages' folder
            window.location.href = 'dashboard.html';
        }, 1000);
    }

    // 2. Component Loader (Nav/Footer)
    // IMPORTANT: If you aren't using a Local Server (like Live Server), 
    // these fetch calls will fail due to browser security (CORS).
    async function loadTemplate(elementId, filePath) {
        try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error(`Failed to load ${filePath}`);
            const html = await response.text();
            document.getElementById(elementId).innerHTML = html;
        } catch (error) {
            console.warn("Component load failed: You likely need to run this through a Local Server (VS Code Live Server).");
        }
    }

    // Fire the loaders
    loadTemplate('mainNav', '../components/nav.html');
    loadTemplate('mainFooter', '../components/footer.html');
</script>
