<script>
    function openModal() { 
        document.getElementById('regModal').style.display = "block"; 
    }
    function closeModal() { 
        document.getElementById('regModal').style.display = "none"; 
    }
    
    window.onclick = function(event) {
        if (event.target == document.getElementById('regModal')) { closeModal(); }
    }

    function handleLogin(sourceId) {
        const inputElement = document.getElementById(sourceId);
        const name = inputElement ? inputElement.value : "";
        // Use event.currentTarget to ensure we hit the button correctly
        const btn = event.currentTarget || event.target;

        if (!name || name.trim() === "") {
            alert("Please enter a name to continue.");
            return;
        }

        // Feedback
        btn.innerHTML = "Peeling...";
        btn.disabled = true;
        btn.style.opacity = "0.7";

        setTimeout(() => {
            localStorage.setItem('bananaUser', name);
            // LOCK: Redirecting to your new landing page
            window.location.href = 'dashboard.html';
        }, 1000);
    }

    // Load components
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
    });
    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });
</script>
