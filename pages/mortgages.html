<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgages | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #ffcc00; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
        .peel-btn { background: #ffcc00; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .peel-btn:hover { background: white; transform: scale(1.05); }
        .fee-highlight { color: #00ff88; font-weight: bold; }

        /* Calculator Specifics */
        .calc-box { background: #1e293b; padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 30px; }
        .calc-input { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; width: 100%; margin-top: 5px; }
        .monthly-display { color: #ffcc00; font-size: 2rem; font-weight: 800; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Find Your <span class="pop">Dream Bunch</span></h1>
        <p>From first-time buyers to remortgaging, we help you find the right rate for your home.</p>
    </div>
</section>

<div class="container">
    <div class="calc-box">
        <h3 style="color: #ffcc00; margin-top:0;">⚡ Live Mortgage Calculator</h3>
        <p style="font-size: 0.9rem; color: #94a3b8;">Enter your numbers below to see an instant monthly estimate:</p>
        
        <div style="display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px;">
            <div style="flex: 1; min-width: 180px;">
                <label style="color:white; font-size: 0.8rem;">Property Value (£)</label>
                <input type="number" id="propVal" class="calc-input" value="300000" oninput="runCalc()">
            </div>
            <div style="flex: 1; min-width: 180px;">
                <label style="color:white; font-size: 0.8rem;">Deposit Amount (£)</label>
                <input type="number" id="depVal" class="calc-input" value="60000" oninput="runCalc()">
            </div>
            <div style="flex: 1; min-width: 120px;">
                <label style="color:white; font-size: 0.8rem;">Term (Years)</label>
                <input type="number" id="termVal" class="calc-input" value="25" oninput="runCalc()">
            </div>
            <div style="flex: 1; min-width: 200px; background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid #ffcc00;">
                <label style="color:#94a3b8; font-size: 0.7rem; text-transform: uppercase;">Est. Monthly Payment</label>
                <span id="monthlyOut" class="monthly-display">£1,345</span>
            </div>
        </div>
    </div>

    <table class="comp-table">
        <thead>
            <tr>
                <th>Lender</th>
                <th>Initial Rate</th>
                <th>Product Fee</th>
                <th>Type</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="dealsTableBody">
            <tr>
                <td colspan="5" style="text-align:center; padding: 40px;">Peeling the latest mortgage rates...</td>
            </tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    // 1. Calculator Logic
    function runCalc() {
        const p = parseFloat(document.getElementById('propVal').value) || 0;
        const d = parseFloat(document.getElementById('depVal').value) || 0;
        const t = parseFloat(document.getElementById('termVal').value) || 1;
        const loan = p - d;
        
        // Using a representative market rate of 4.5% for the tool's logic
        const i = 0.045 / 12;
        const n = t * 12;

        if (loan <= 0) {
            document.getElementById('monthlyOut').innerText = "£0";
            return;
        }

        const monthly = (loan * (i * Math.pow(1 + i, n))) / (Math.pow(1 + i, n) - 1);
        document.getElementById('monthlyOut').innerText = `£${Math.round(monthly).toLocaleString()}`;
    }

    // 2. Load Nav & Footer
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    // 3. Load Live Data
    async function fetchLiveDeals() {
        const tableBody = document.getElementById('dealsTableBody');
        try {
            const response = await fetch(`${API_URL}/deals?category=mortgage`);
            const deals = await response.json();

            if (deals.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No mortgage deals found.</td></tr>';
                return;
            }

            tableBody.innerHTML = '';
            deals.forEach(deal => {
                const rate = parseFloat(deal.price).toFixed(2);
                const fee = parseFloat(deal.original_price).toLocaleString();

                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${deal.brand}</strong></td>
                        <td>${rate}%</td>
                        <td class="fee-highlight">£${fee}</td>
                        <td>${deal.name}</td>
                        <td><button class="peel-btn" onclick="saveAndGo('${deal.brand}')">Peel the Deal</button></td>
                    </tr>
                `;
            });
        } catch (err) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Engine connection error.</td></tr>';
        }
    }

    function saveAndGo(brand) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(brand + " - Mortgage Rate");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    // Run on Load
    runCalc();
    fetchLiveDeals();
</script>
</body>
</html>
