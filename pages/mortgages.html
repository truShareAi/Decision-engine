<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgages | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .calc-container { background: #1a222f; padding: 30px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 30px; }
        .calc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .calc-input-group label { display: block; color: #ffcc00; font-size: 0.8rem; margin-bottom: 8px; font-weight: bold; }
        .calc-input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; font-size: 1rem; }
        
        .result-box { background: #2d3a4f; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #ffcc00; }
        .monthly-amt { font-size: 2.5rem; font-weight: 800; color: #ffcc00; display: block; }
        
        .comp-table { width: 100%; border-collapse: collapse; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #ffcc00; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area">
    <div class="hero-container">
        <h1>Secure Your <span class="pop">Home Bunch</span></h1>
        <p>Estimate your monthly payments and peel back the market's top rates.</p>
    </div>
</section>

<div class="container">
    <div class="calc-container">
        <div class="calc-grid">
            <div class="calc-input-group">
                <label>Property Value (£)</label>
                <input type="number" id="propValue" class="calc-input" value="300000" oninput="calculateMortgage()">
            </div>
            <div class="calc-input-group">
                <label>Deposit (£)</label>
                <input type="number" id="deposit" class="calc-input" value="60000" oninput="calculateMortgage()">
            </div>
            <div class="calc-input-group">
                <label>Term (Years)</label>
                <input type="number" id="term" class="calc-input" value="25" oninput="calculateMortgage()">
            </div>
            <div class="result-box">
                <span style="color: #94a3b8; font-size: 0.8rem; text-transform: uppercase;">Est. Monthly Payment</span>
                <span id="monthlyResult" class="monthly-amt">£1,345</span>
            </div>
        </div>
    </div>

    <table class="comp-table">
        <thead>
            <tr>
                <th>Lender</th>
                <th>Initial Rate</th>
                <th>Product Type</th>
                <th>Fees</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="dealsTableBody">
            <tr><td colspan="5" style="text-align:center; padding: 40px;">Finding the best rates...</td></tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    // 1. Basic Math for the Calculator
    function calculateMortgage() {
        const prop = parseFloat(document.getElementById('propValue').value) || 0;
        const dep = parseFloat(document.getElementById('deposit').value) || 0;
        const term = parseFloat(document.getElementById('term').value) || 25;
        const loan = prop - dep;
        
        // We'll use a representative average rate of 4.5% for the calculator display
        const annualRate = 0.045; 
        const monthlyRate = annualRate / 12;
        const numPayments = term * 12;

        if (loan <= 0) {
            document.getElementById('monthlyResult').innerText = "£0";
            return;
        }

        // Standard Amortization Formula: M = P [ i(1 + i)^n ] / [ (1 + i)^n – 1 ]
        const monthly = (loan * (monthlyRate * Math.pow(1 + monthlyRate, numPayments))) / (Math.pow(1 + monthlyRate, numPayments) - 1);
        
        document.getElementById('monthlyResult').innerText = `£${Math.round(monthly).toLocaleString()}`;
    }

    // 2. Fetch Live Rates
    async function fetchLiveRates() {
        const tableBody = document.getElementById('dealsTableBody');
        try {
            const response = await fetch(`${API_URL}/deals?category=mortgages`);
            const deals = await response.json();
            
            if (deals.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No mortgage deals found.</td></tr>';
                return;
            }

            tableBody.innerHTML = '';
            deals.forEach(deal => {
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${deal.brand}</strong></td>
                        <td style="color:#ffcc00; font-weight:bold;">${deal.price}%</td>
                        <td>${deal.name}</td>
                        <td>£${deal.original_price}</td>
                        <td><button class="peel-btn" onclick="saveAndGo('${deal.brand}')">View Deal</button></td>
                    </tr>
                `;
            });
        } catch (err) { tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Connection error.</td></tr>'; }
    }

    function saveAndGo(brand) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(brand + " - Mortgage Inquiry");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    // Initialize
    fetch('../components/nav.html').then(res => res.text()).then(data => { document.getElementById('mainNav').innerHTML = data; });
    fetch('../components/footer.html').then(res => res.text()).then(data => { document.getElementById('mainFooter').innerHTML = data; });
    calculateMortgage();
    fetchLiveRates();
</script>
</body>
</html>
