<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Deals | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .deal-card {
            background: #1a222f;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #334155;
            text-align: center;
            transition: 0.3s;
        }
        .deal-card:hover {
            transform: translateY(-5px);
            border-color: #ffcc00;
        }
        .price-tag {
            font-size: 1.5rem;
            color: #ffcc00;
            font-weight: 800;
            margin: 10px 0;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-right: 8px;
        }
        .brand-badge {
            background: #2d3a4f;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #cbd5e1;
            text-transform: uppercase;
        }
        .peel-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Top <span class="pop">Shopping Picks</span></h1>
        <p>From tech to trending fashion, we peel back the price tags on the best deals online.</p>
    </div>
</section>

<div class="container">
    <div id="shoppingGrid" class="deals-grid">
        <p style="text-align:center; grid-column: 1/-1;">Hunting for the best shopping deals...</p>
    </div>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    // 1. Component Loading
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    // 2. Load Live Data for Shopping
    async function fetchLiveDeals() {
        const grid = document.getElementById('shoppingGrid');
        try {
            const response = await fetch(`${API_URL}/deals?category=shopping`);
            const deals = await response.json();

            if (deals.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No shopping deals in the bunch yet. Check back soon!</p>';
                return;
            }

            grid.innerHTML = '';
            deals.forEach(deal => {
                const price = parseFloat(deal.price).toFixed(2);
                const original = parseFloat(deal.original_price).toFixed(2);
                
                grid.innerHTML += `
                    <div class="deal-card">
                        <span class="brand-badge">${deal.brand}</span>
                        <h3 style="margin-top:15px; color:white;">${deal.name}</h3>
                        <div class="price-tag">
                            <span class="old-price">£${original}</span>£${price}
                        </div>
                        <p style="color: #94a3b8; font-size: 0.9rem;">Available at ${deal.source}</p>
                        <button class="peel-btn" onclick="saveAndGo('${deal.brand} ${deal.name}')">Peel the Deal</button>
                    </div>
                `;
            });
        } catch (err) {
            grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Engine connection error.</p>';
        }
    }

    function saveAndGo(item) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(item + " - Shopping Deal");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    fetchLiveDeals();
</script>
</body>
</html>
