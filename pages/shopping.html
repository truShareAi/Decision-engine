<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Deals | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .deal-card {
            background: #1a222f;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #334155;
            text-align: center;
            transition: 0.3s;
        }
        .deal-card:hover {
            transform: translateY(-5px);
            border-color: #ffcc00;
        }
        .price-tag {
            font-size: 1.5rem;
            color: #ffcc00;
            font-weight: 800;
            margin: 10px 0;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-right: 8px;
        }
        .store-badge {
            background: #2d3a4f;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #cbd5e1;
            text-transform: uppercase;
        }
        .peel-btn {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Fresh <span class="pop">Grocery Splits</span></h1>
        <p>We've hunted down the biggest savings from the top supermarkets so you don't have to.</p>
    </div>
</section>

<div class="container">
    <div id="groceryGrid" class="deals-grid">
        <p style="text-align:center; grid-column: 1/-1;">Peeling the freshest grocery deals...</p>
    </div>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com';
    const savedName = localStorage.getItem('bananaUser');

    // 1. Load Nav & Footer
    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
        const authArea = document.getElementById('navAuthSection');
        if (savedName && authArea) {
            authArea.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <a href="/index.html" style="color: white; text-decoration: none; font-size: 0.9rem;">Home</a>
                    <a href="/pages/dashboard.html" style="color: #ffcc00; text-decoration: none; font-weight: bold; border: 1px solid #ffcc00; padding: 5px 12px; border-radius: 20px;">Hi, ${savedName}</a>
                </div>
            `;
        }
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    // 2. Load Live Data for Groceries
    async function fetchLiveDeals() {
        const grid = document.getElementById('groceryGrid');
        try {
            const response = await fetch(`${API_URL}/deals?category=groceries`);
            const deals = await response.json();

            if (deals.length === 0) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No grocery deals in the bunch yet.</p>';
                return;
            }

            grid.innerHTML = '';
            deals.forEach(deal => {
                grid.innerHTML += `
                    <div class="deal-card">
                        <span class="store-badge">${deal.source}</span>
                        <h3>${deal.brand} ${deal.name}</h3>
                        <div class="price-tag">
                            <span class="old-price">£${deal.original_price}</span>£${deal.price}
                        </div>
                        <p>Latest price drop at ${deal.source}.</p>
                        <button class="peel-btn" onclick="saveAndGo('${deal.brand} ${deal.name}')">View Deal</button>
                    </div>
                `;
            });
        } catch (err) {
            grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Engine connection error.</p>';
        }
    }

    // 3. Logic: Save to Dashboard
    function saveAndGo(item) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(item + " - Grocery Deal");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    fetchLiveDeals();
</script>
</body>
</html>
