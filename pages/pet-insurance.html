<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Insurance | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #ffcc00; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
        .peel-btn { background: #ffcc00; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .peel-btn:hover { background: white; transform: scale(1.05); }
        .annual-price { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Protect Your <span class="pop">Furry Friends</span></h1>
        <p>Don't let vet bills drive you bananas. Compare the best cover for your pets in a split.</p>
    </div>
</section>

<div class="container">
    <table class="comp-table">
        <thead>
            <tr>
                <th>Provider</th>
                <th>Monthly</th>
                <th>Annual (Save!)</th>
                <th>Animal Type</th>
                <th>Vet Fee Limit</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="dealsTableBody">
            <tr>
                <td colspan="6" style="text-align:center; padding: 40px;">Peeling the latest pet deals...</td>
            </tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const API_URL = 'https://banana-api-engine.onrender.com/api';

    fetch('../components/nav.html').then(res => res.text()).then(data => {
        document.getElementById('mainNav').innerHTML = data;
    });

    fetch('../components/footer.html').then(res => res.text()).then(data => {
        document.getElementById('mainFooter').innerHTML = data;
    });

    async function fetchLiveDeals() {
        const tableBody = document.getElementById('dealsTableBody');
        try {
            const response = await fetch(`${API_URL}/deals?category=pet-insurance`);
            const deals = await response.json();

            if (deals.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No pet deals found yet.</td></tr>';
                return;
            }

            tableBody.innerHTML = '';
            deals.forEach(deal => {
                const mPrice = parseFloat(deal.price).toFixed(2);
                const aPrice = parseFloat(deal.original_price).toFixed(2);
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${deal.brand}</strong></td>
                        <td>£${mPrice}</td>
                        <td class="annual-price">£${aPrice}</td>
                        <td>${deal.name}</td>
                        <td>${deal.source}</td>
                        <td><button class="peel-btn" onclick="saveAndGo('${deal.brand}')">Peel the Deal</button></td>
                    </tr>
                `;
            });
        } catch (err) {
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Engine connection error.</td></tr>';
        }
    }

    function saveAndGo(brand) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(brand + " - Pet Insurance Deal");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }

    fetchLiveDeals();
</script>
</body>
</html>
