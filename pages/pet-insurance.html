<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Insurance | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a222f; border-radius: 15px; overflow: hidden; }
        .comp-table th { background: #2d3a4f; padding: 15px; text-align: left; color: #ffcc00; }
        .comp-table td { padding: 15px; border-bottom: 1px solid #334155; color: white; }
        .peel-btn { background: #ffcc00; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .peel-btn:hover { background: white; transform: scale(1.05); }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<section class="hero-area" style="padding: 40px 20px;">
    <div class="hero-container">
        <h1>Protect Your <span class="pop">Furry Friends</span></h1>
        <p>Don't let vet bills drive you bananas. Compare the best cover for your pets in a split.</p>
    </div>
</section>

<div class="container">
    <table class="comp-table">
        <thead>
            <tr>
                <th>Provider</th>
                <th>Monthly</th>
                <th>Animal Type</th>
                <th>Vet Fee Limit</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Paws & Peel</strong></td>
                <td>£14.20</td>
                <td>Cats & Dogs</td>
                <td>£5,000</td>
                <td><button class="peel-btn" onclick="savePeel('Paws & Peel')">Peel the Deal</button></td>
            </tr>
            <tr>
                <td><strong>Top Banana Pets</strong></td>
                <td>£18.50</td>
                <td>All Pets</td>
                <td>£8,000</td>
                <td><button class="peel-btn" onclick="savePeel('Top Banana Pets')">Peel the Deal</button></td>
            </tr>
            <tr>
                <td><strong>Whiskers Direct</strong></td>
                <td>£11.00</td>
                <td>Cats Only</td>
                <td>£3,000</td>
                <td><button class="peel-btn" onclick="savePeel('Whiskers Direct')">Peel the Deal</button></td>
            </tr>
        </tbody>
    </table>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    // 1. Get the name from memory
    const savedName = localStorage.getItem('bananaUser');

    // 2. Load Nav and Sync the Name swap
    fetch('../components/nav.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('mainNav').innerHTML = data;

            // Manual Sync: Swap 'Sign In' for the name if logged in
            const authArea = document.getElementById('navAuthSection');
            if (savedName && authArea) {
                authArea.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <a href="/index.html" style="color: white; text-decoration: none; font-size: 0.9rem;">Home</a>
                        <a href="/pages/dashboard.html" style="color: #ffcc00; text-decoration: none; font-weight: bold; border: 1px solid #ffcc00; padding: 5px 12px; border-radius: 20px;">Hi, ${savedName}</a>
                    </div>
                `;
            }
        });

    // 3. Load Footer
    fetch('../components/footer.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('mainFooter').innerHTML = data;
        });

    // 4. Save Peel Logic
    function savePeel(provider) {
        let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
        history.unshift(provider + " - Pet Insurance");
        localStorage.setItem('searchHistory', JSON.stringify(history));
        window.location.href = 'dashboard.html';
    }
</script>

</body>
</html>
