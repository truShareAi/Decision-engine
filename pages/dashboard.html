<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard | Banana</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .dashboard-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; margin: 60px 0; }
        .user-sidebar { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid #334155; height: fit-content; text-align: center; }
        .stat-card { background: #0f172a; padding: 20px; border-radius: 12px; margin-top: 25px; border-left: 4px solid var(--brand-yellow); text-align: left; }
        .history-list { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid #334155; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #334155; }
        .history-item:last-child { border: none; }
        .tag { background: rgba(255, 204, 0, 0.1); color: var(--brand-yellow); padding: 6px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .logout-btn { background: white; color: black; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; margin-top: 30px; font-size: 0.85rem; transition: 0.3s; }
        .logout-btn:hover { background: var(--brand-yellow); }
        
        @media (max-width: 850px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="top-nav" id="mainNav"></nav>

<div class="container">
    <div class="dashboard-grid">
        <aside class="user-sidebar">
            <div style="font-size: 4rem; margin-bottom: 15px;">🍌</div>
            <h2 id="dashWelcome">Hi, <span class="pop" id="userNameBox">User</span></h2>
            <p style="font-size: 0.9rem; color: #64748b;">Member since 2026</p>
            
            <div class="stat-card">
                <div style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Total Peels</div>
                <div style="font-size: 2rem; font-weight: 800;" id="peelCount">0</div>
            </div>

            <button class="logout-btn" onclick="logout()">Logout</button>
        </aside>

        <main class="history-list">
            <h3>Recent <span class="pop">Activity</span></h3>
            <p style="color: #94a3b8; font-size: 0.95rem; margin-bottom: 25px;">Your personalised search history and saved deals.</p>
            <div id="historyContainer">
                <div style="text-align: center; opacity: 0.5; padding: 60px 0;">
                    <p>No recent searches yet. Start peeling!</p>
                </div>
            </div>
        </main>
    </div>
</div>

<footer class="site-footer" id="mainFooter"></footer>

<script>
    const savedName = localStorage.getItem('bananaUser');
    if (!savedName) { window.location.href = 'signin.html'; }

    document.getElementById('userNameBox').innerText = savedName;

    fetch('../components/nav.html').then(res => res.text()).then(data => { document.getElementById('mainNav').innerHTML = data; });
    fetch('../components/footer.html').then(res => res.text()).then(data => { document.getElementById('mainFooter').innerHTML = data; });

    function logout() {
        localStorage.removeItem('bananaUser');
        window.location.href = '../index.html';
    }
</script>
</body>
</html>
