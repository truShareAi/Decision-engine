<script>
    // Use a function that we can call manually if the auto-run fails
    function checkBananaAuth() {
        const userInStorage = localStorage.getItem('bananaUser');
        const target = document.getElementById('navAuthSection');

        if (userInStorage && target) {
            target.innerHTML = `
                <div style="display: flex; align-items: center; gap: 15px;">
                    <a href="/index.html" style="color: white; text-decoration: none; font-size: 0.9rem;">Home</a>
                    <a href="/pages/dashboard.html" style="color: #ffcc00; text-decoration: none; font-weight: bold; border: 1px solid #ffcc00; padding: 5px 12px; border-radius: 20px;">Hi, ${userInStorage}</a>
                </div>
            `;
        }
    }

    // Run immediately
    checkBananaAuth();

    // Run again in 100ms just in case the DOM was still painting
    setTimeout(checkBananaAuth, 100);
</script>
