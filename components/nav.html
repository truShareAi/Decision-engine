<script>
(function() {
    function updateNav() {
        const user = localStorage.getItem('bananaUser');
        const target = document.getElementById('navAuthSection');
        if (user && target) {
            target.innerHTML = `<a href="/pages/dashboard.html" style="color: #ffcc00; font-weight: bold; border: 1px solid #ffcc00; padding: 5px 12px; border-radius: 20px;">Hi, ${user}</a>`;
        }
    }
    updateNav();
    const observer = new MutationObserver(() => {
        if (document.getElementById('navAuthSection')) {
            updateNav();
            observer.disconnect();
        }
    });
    observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
